spring.application.name=clinic-appointment-booking
server.port=8080

# ================================
# Database Configuration
# ================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA Configuration
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ================================
# JWT Configuration
# ================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# ================================
# Email Configuration
# ================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ================================
# Logging
# ================================
logging.level.root=INFO
logging.level.com.clinic.booking=DEBUG
logging.level.com.clinic.booking.service.AppointmentService=DEBUG
logging.level.com.clinic.booking.controller.AppointmentController=DEBUG
logging.level.com.clinic.booking.exception.GlobalExceptionHandler=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ================================
# OAuth2 Google
# ================================
google.client.id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-id=${google.client.id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# ================================
# File Upload Configuration
# ================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ================================
# VNPAY (Sandbox)
# ================================
vnpay.payment-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.return-url=${VNPAY_RETURN_URL}

# ================================
# MOMO (Sandbox)
# ================================
momo.endpoint=https://test-payment.momo.vn/v2/gateway/api/create
momo.partner-code=${MOMO_PARTNER_CODE}
momo.access-key=${MOMO_ACCESS_KEY}
momo.secret-key=${MOMO_SECRET_KEY}
momo.request-type=payWithATM
momo.redirect-url=${MOMO_REDIRECT_URL}
momo.ipn-url=${MOMO_IPN_URL}

# ================================
# App URLs
# ================================
app.frontend-url=${FRONTEND_URL}
app.frontend.url=${app.frontend-url}

# ================================
# AI Assistant Groq Configuration
# ================================
groq.api.key=${GROQ_API_KEY}
groq.model=llama-3.3-70b-versatile