spring.application.name=clinic-appointment-booking
server.port=8080

# ================================
# Database Configuration
# ================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/clinic_booking?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA Configuration
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ================================
# JWT Configuration
# ================================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ================================
# Email Configuration
# ================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ================================
# Logging
# ================================
logging.level.root=INFO
logging.level.com.clinic.booking=DEBUG
logging.level.com.clinic.booking.service.AppointmentService=DEBUG
logging.level.com.clinic.booking.controller.AppointmentController=DEBUG
logging.level.com.clinic.booking.exception.GlobalExceptionHandler=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ================================
# OAuth2 Google
# ================================
google.client.id=${GOOGLE_CLIENT_ID:dummy-id}
spring.security.oauth2.client.registration.google.client-id=${google.client.id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# ================================
# File Upload Configuration
# ================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ================================
# VNPAY (Sandbox)
# ================================
vnpay.payment-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.tmn-code=${VNPAY_TMN_CODE:dummy}
vnpay.hash-secret=${VNPAY_HASH_SECRET:dummy}
vnpay.return-url=${VNPAY_RETURN_URL:https://clinic-appointment-booking-26x8.onrender.com/api/payment/vnpay-return}

# ================================
# MOMO (Sandbox)
# ================================
momo.endpoint=https://test-payment.momo.vn/v2/gateway/api/create
momo.partner-code=${MOMO_PARTNER_CODE:dummy}
momo.access-key=${MOMO_ACCESS_KEY:dummy}
momo.secret-key=${MOMO_SECRET_KEY:dummy}
momo.request-type=payWithCC
momo.redirect-url=${MOMO_REDIRECT_URL:http://localhost:3000/booking/payment/success}
momo.ipn-url=${MOMO_IPN_URL:https://clinic-appointment-booking-26x8.onrender.com/api/payment/momo-ipn}

# ================================
# App URLs
# ================================
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.frontend.url=${app.frontend-url}

# ================================
# AI Assistant Groq Configuration
# ================================
groq.api.key=${GROQ_API_KEY:dummy}
groq.model=llama-3.3-70b-versatile
